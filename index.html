*{

body{

text-align:center;

.container{

h1{

.buttons{

button{

button:active{

#finish{

.final{

.text{

}

.qr{

margin-top:24px;

background:white;

padding:12px;

}

.heart{

position:fixed;

pointer-events:none;

z-index:999;

animation:fly linear;

}

@keyframes fly{

0%{

transform:
translateY(0);

opacity:1;

}

100%{

transform:
translateY(-170vh)

</head>

.getElementById(

.getElementById(
